# https://sharphook.tolik.io/articles/keycodes.html
modmap:
  - name: Keys
    remap:
      CapsLock: Super_L
      Super_L: Shift_R
      Alt_R: Ctrl_L
#      Ctrl_R: Shift_L

keymap:
  - name: Alt keys
    remap:
      Alt-h: left
      Alt-j: down
      Alt-k: up
      Alt-l: right
      Alt-w: backspace
      Alt-f: backspace
      Alt-m: Enter
      Alt-i: Esc
      Alt-u: Esc
      #Esc: reserved
      Ctrl_L: reserved

      Shift_L-Shift_R-s:
        launch: ["bash", "-c", "DISPLAY=:0 flameshot gui"]

      # If you hash sysrq 5 times and reverse the letters, you will get prtsc,
      # so this is obviously(.) print screen key.
      # doesn't work now. WTF
      sysrq:
        launch: ["bash", "-c", "DISPLAY=:0 flameshot gui"]

      Super-z:
        remap:
          u:
            launch: ["/usr/local/bin/dmenu_unicode.sh"]
          b:
            launch: ["/home/artarar/shortcuts/bugg"]
          c:
            launch: ["/usr/bin/copyq", "show"]
